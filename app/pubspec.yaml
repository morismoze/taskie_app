name: taskie
description: "An app to help parents track tasks being done by their kids"
publish_to: "none" # Don't publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^15.1.2
  json_annotation: ^4.9.0
  provider: ^6.1.5
  forui: ^0.12.0
  flutter_secure_storage: ^9.2.4
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0
  flutter_animate: ^4.5.2
  package_info_plus: ^8.3.0
  share_plus: ^11.0.0
  logging: ^1.3.0
  intl: any
  google_sign_in: ^6.3.0
  envied: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  envied_generator: ^1.1.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

scripts:
  run:development: dart run build_runner clean && dart run build_runner build --delete-conflicting-outputs --define="envied_generator:envied=path=.env.development" && flutter run --target lib/main_development.dart
  run:staging: dart run build_runner clean && dart run build_runner build --delete-conflicting-outputs --define="envied_generator:envied=path=.env.staging" && flutter run --target lib/main_staging.dart
  run:production: dart run build_runner clean && dart run build_runner build --delete-conflicting-outputs --define="envied_generator:envied=path=.env.production" && flutter run --target lib/main_production.dart
